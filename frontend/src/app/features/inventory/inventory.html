<section class="inventory">
  <h2>Inventory</h2>

  @if (inventory().length === 0) {
    <p>No items in inventory.</p>
  } @else {
    <ul>
      @for (item of inventory(); track item.itemId) {
        <li>
          <span>{{ item.name }}</span>
          <span>Quantity: {{ item.quantity }}</span>
        </li>
      }
    </ul>
  }
</section>
