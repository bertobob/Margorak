<aside class="equipment-panel" aria-label="Equipment">
  <section class="equipment-slots">
    <div class="equipment-slot-row">
      <img class="equipment-slot-icon" src="icons/equipment/helmet.svg" alt="" />
      <button
        class="equipment-slot"
        type="button"
        [disabled]="!equipment().Helmet"
        (click)="onItemClick(equipment().Helmet!.item)"
      >
        {{ equipment().Helmet?.item?.name ?? 'empty' }}
      </button>
      <button
        class="equipment-unequip-button"
        type="button"
        [disabled]="!equipment().Helmet"
        (click)="onUnequipClicked('Helmet')"
      >
        Unequip
